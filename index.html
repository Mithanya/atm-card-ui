<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>South Indian Bank | ATM Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #d4d9e2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'SF Mono', 'Space Mono', 'Segoe UI', monospace;
            padding: 20px;
        }

        /* main card container - physical card feel */
        .card {
            max-width: 520px;
            width: 100%;
            background: #1f2a36;
            background: linear-gradient(145deg, #1e2935 0%, #121a24 100%);
            border-radius: 20px;
            padding: 24px 28px 32px 28px;
            box-shadow: 
                0 20px 35px -10px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.08) inset,
                0 0 0 2px rgba(0, 0, 0, 0.2) inset;
            position: relative;
            transition: all 0.2s ease;
        }

        /* subtle wear effect - makes it feel real */
        .card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,240,0.03) 0%, rgba(0,0,0,0) 80%);
            pointer-events: none;
        }

        /* top section - chip and bank */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 28px;
        }

        /* physical chip */
        .chip {
            width: 52px;
            height: 42px;
            background: #c2aa6b;
            background: linear-gradient(135deg, #d8c48a, #b58f44);
            border-radius: 8px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,200,0.6);
        }

        .chip:before {
            content: "";
            position: absolute;
            top: 8px;
            left: 10px;
            width: 22px;
            height: 4px;
            background: #5e451c;
            border-radius: 1px;
            box-shadow: 0 11px 0 #5e451c, 0 22px 0 #5e451c;
        }

        .chip:after {
            content: "";
            position: absolute;
            bottom: 7px;
            right: 9px;
            width: 16px;
            height: 3px;
            background: #7a602d;
            border-radius: 1px;
        }

        .bank {
            text-align: right;
        }

        .bank-name {
            font-family: 'Segoe UI', 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.8px;
            color: #eeddbb;
            text-shadow: 0 1px 1px rgba(0,0,0,0.5);
        }

        .card-type {
            font-family: 'Segoe UI', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: #b8c7dd;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 3px 12px;
            border-radius: 30px;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        /* card number */
        .card-number {
            font-family: 'Courier New', 'SF Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #f5efdf;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 16px;
            border-radius: 14px;
            text-align: center;
            margin-bottom: 24px;
            border: 0.5px solid rgba(255,255,210,0.2);
            word-spacing: 4px;
        }

        /* details row */
        .details {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .expiry {
            background: rgba(0, 0, 0, 0.45);
            padding: 6px 18px;
            border-radius: 30px;
            border-left: 3px solid #c2a144;
        }

        .expiry-label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9eb1cc;
            margin-bottom: 3px;
        }

        .expiry-date {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #fcf3df;
            letter-spacing: 1px;
        }

        .holder {
            background: rgba(0, 0, 0, 0.45);
            padding: 6px 18px;
            border-radius: 30px;
            border-right: 3px solid rgba(194, 161, 68, 0.8);
            flex: 1;
            text-align: right;
        }

        .holder-label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9eb1cc;
            margin-bottom: 3px;
        }

        .holder-name {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #fef6ea;
            text-transform: uppercase;
        }

        /* footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .network {
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 20px;
            border-radius: 40px;
        }

        .network span {
            font-family: 'Segoe UI', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            color: #e8ddbc;
        }

        .magnetic {
            width: 50px;
            height: 26px;
            background: repeating-linear-gradient(
                90deg,
                #2a2418,
                #2a2418 6px,
                #4a3e2a 6px,
                #4a3e2a 12px
            );
            border-radius: 3px;
            opacity: 0.7;
        }

        /* subtle shadow at bottom for depth */
        .card-shadow {
            position: absolute;
            bottom: -6px;
            left: 8px;
            right: 8px;
            height: 8px;
            background: rgba(0,0,0,0.2);
            filter: blur(4px);
            border-radius: 50%;
            z-index: -1;
        }

        /* responsiveness */
        @media (max-width: 500px) {
            .card {
                padding: 18px 20px 24px 20px;
            }
            .card-number {
                font-size: 16px;
                letter-spacing: 2px;
                padding: 10px 12px;
            }
            .bank-name {
                font-size: 15px;
            }
            .holder-name, .expiry-date {
                font-size: 13px;
            }
            .chip {
                width: 45px;
                height: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="chip"></div>
            <div class="bank">
                <div class="bank-name">SOUTH INDIAN BANK</div>
                <div class="card-type">PLATINUM</div>
            </div>
        </div>

        <div class="card-number">
            4587 9234 7712 6601
        </div>

        <div class="details">
            <div class="expiry">
                <div class="expiry-label">VALID THRU</div>
                <div class="expiry-date">12/29</div>
            </div>
            <div class="holder">
                <div class="holder-label">CARD HOLDER</div>
                <div class="holder-name">MITHANYA M</div>
            </div>
        </div>

        <div class="footer">
            <div class="network">
                <span>VISA</span>
            </div>
            <div class="magnetic"></div>
        </div>
        <div class="card-shadow"></div>
    </div>
</body>
</html>
